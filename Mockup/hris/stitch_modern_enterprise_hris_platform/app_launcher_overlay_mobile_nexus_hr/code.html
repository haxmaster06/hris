<script>
        // Simple logic to toggle launcher for demonstration
        document.querySelector('[data-icon="apps"]').parentElement.addEventListener('click', () => {
            const launcher = document.getElementById('launcher');
            launcher.style.display = 'flex';
        });

        // Close on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('launcher').style.display = 'none';
            }
        });
    </script>
