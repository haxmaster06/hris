<!DOCTYPE html>

<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-background {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex flex-col justify-center items-center px-gutter py-xl">
<!-- Header/Logo Area -->
<header class="mb-xl text-center">
<div class="flex items-center justify-center gap-sm mb-md">
<div class="bg-primary-container p-sm rounded-xl">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">apps</span>
</div>
<h1 class="font-headline-sm text-headline-sm text-primary tracking-tight font-bold">Nexus HR</h1>
</div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background">Welcome back</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Sign in to manage your enterprise</p>
</header>
<!-- Main Login Card -->
<main class="w-full max-w-[400px]">
<div class="bg-surface-container-lowest rounded-xl border border-outline-variant p-lg shadow-sm">
<form action="#" class="space-y-lg">
<!-- Email Field -->
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full pl-xl pr-md py-md rounded-xl border border-outline-variant bg-surface-container-low focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-body-md text-body-md" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-sm">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-xl pr-md py-md rounded-xl border border-outline-variant bg-surface-container-low focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-body-md text-body-md" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-sm">
<input class="w-md h-md rounded text-primary focus:ring-primary border-outline-variant" id="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant" for="remember">Remember this device</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-white font-label-md text-label-md py-md rounded-xl hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-xl">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-label-sm">
<span class="bg-surface-container-lowest px-md text-outline">Or continue with</span>
</div>
</div>
<!-- SSO Options -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-sm py-md px-md rounded-xl border border-outline-variant hover:bg-surface-container-low transition-colors font-label-md text-label-md text-on-surface">
<div class="w-5 h-5 flex items-center justify-center">
<img class="w-full h-full" data-alt="The official Google 'G' logo rendered with crisp primary colors on a white circular background, styled as a minimalist vector icon for a professional corporate single sign-on interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCThAxwDHCIr87oHwutDqZBDdxLDCYfriQQIb3uL0IXo2FKU108EliKPdWbjwKXtYOf7i408tkKW5qVHV4IkwZXMsOmgqWeS53OLUEeOK9dH-yYDbuxXZ1kebTYbWaAMKQBr626MRpjTK3T_NQ9jJ8hx6ANXNRBtKQcjj7uP9lg3TbnYORhhQZ4c3iI-NjeWx4jENy4r0BD4HP7zt7eETHK_UE5bIlQUCIaO499OwL8JM4QLxZ1J00Yi89cpEGqDdt26HEVhk8Qag"/>
</div>
                    Google
                </button>
<button class="flex items-center justify-center gap-sm py-md px-md rounded-xl border border-outline-variant hover:bg-surface-container-low transition-colors font-label-md text-label-md text-on-surface">
<div class="w-5 h-5 flex items-center justify-center">
<img class="w-full h-full" data-alt="The official Microsoft logo icon, featuring the four colored squares in a clean grid, optimized for high-contrast professional UI design with sharp edges and vibrant branding." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCqUk6-ANK16Ne1-8OLYQYib0y23ZypvROCWQkFpaVMjzhrvQ8wK-iNFWGpkg4z5y7sgaA7wZG-bLAsmeQ23KUnaPPWKtSsH3Yuic0ddIL-DSjhYaJEDAEV-TSJC04yVChIxkJNVY9ac4KXqQQS_VEVZeabgz6NuOdIxbwabsZAsuIlODONSrSliIhbiYqMQSHUdw1rSLYoCCuqd2_bzqpXSgej6BYER8F1ex6BRroamFbZ1pFd0TuJQwKaX3GyLJ9T_L5ee4DCbw"/>
</div>
                    Microsoft
                </button>
</div>
</div>
</main>
<!-- Footer -->
<footer class="mt-2xl text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
            Don't have an account? 
            <a class="text-primary font-label-sm font-semibold hover:underline" href="#">Contact HR Admin</a>
</p>
<div class="mt-xl flex justify-center gap-md text-outline font-label-sm">
<a class="hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
<span>•</span>
<a class="hover:text-on-surface transition-colors" href="#">Terms of Service</a>
</div>
</footer>
<!-- Background Decoration (Atmospheric) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none opacity-40 overflow-hidden">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary-container/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[0%] -right-[10%] w-[50%] h-[50%] bg-tertiary-fixed/20 rounded-full blur-[120px]"></div>
</div>
<script>
        // Micro-interaction for button press
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => {
                btn.style.transform = 'scale(0.97)';
            });
            btn.addEventListener('mouseup', () => {
                btn.style.transform = 'scale(1)';
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = 'scale(1)';
            });
        });

        // Simple input focus effects handled by Tailwind, 
        // but could add custom logic here if needed.
    </script>
</body></html>
